<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Header -->
<header>
    <h1>🎓 SmartPlacementSystem</h1>
    <p>Student Dashboard</p>
</header>

<!-- Dashboard -->
<main>
    <div class="dashboard">

        <!-- Welcome -->
        <h2>👋 Welcome, <span id="studentName">Student</span>!</h2>
        <br>

        <!-- Available Jobs -->
        <h3>💼 Available Jobs</h3>
        <br>
        <table>
            <thead>
            <tr>
                <th>Job Title</th>
                <th>Company</th>
                <th>Location</th>
                <th>Salary</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="jobsTable">
            <!-- Jobs will be loaded here -->
            <tr>
                <td colspan="5" style="text-align:center;">
                    Loading jobs...
                </td>
            </tr>
            </tbody>
        </table>

        <br><br>

        <!-- My Applications -->
        <h3>📋 My Applications</h3>
        <br>
        <table>
            <thead>
            <tr>
                <th>Job Title</th>
                <th>Company</th>
                <th>Status</th>
                <th>Applied On</th>
            </tr>
            </thead>
            <tbody id="applicationsTable">
            <!-- Applications will be loaded here -->
            <tr>
                <td colspan="4" style="text-align:center;">
                    No applications yet
                </td>
            </tr>
            </tbody>
        </table>

        <br>
        <button onclick="logout()"
                style="width:150px; background-color:#e74c3c;">
            Logout
        </button>

    </div>
</main>

<!-- Footer -->
<footer>
    <p>© 2026 SmartPlacementSystem | All Rights Reserved</p>
</footer>

<script src="../js/student.js"></script>
</body>
</html>
