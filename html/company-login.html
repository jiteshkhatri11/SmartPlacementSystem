<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Header -->
<header>
    <h1>🎓 SmartPlacementSystem</h1>
    <p>Company Login</p>
</header>

<!-- Login Form -->
<main>
    <div class="form-container">
        <h2>🏢 Company Login</h2>

        <div id="message"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter company email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <button onclick="companyLogin()">Login</button>

        <p style="text-align:center; margin-top:15px;">
            Don't have an account?
            <a href="company-register.html">Register here</a>
        </p>

        <p style="text-align:center; margin-top:10px;">
            <a href="index.html">← Back to Home</a>
        </p>
    </div>
</main>

<!-- Footer -->
<footer>
    <p>© 2026 SmartPlacementSystem | All Rights Reserved</p>
</footer>

<script src="../js/company.js"></script>
</body>
</html>
