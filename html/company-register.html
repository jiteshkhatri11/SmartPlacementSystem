<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Register</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Header -->
<header>
    <h1>🎓 SmartPlacementSystem</h1>
    <p>Company Registration</p>
</header>

<!-- Register Form -->
<main>
    <div class="form-container">
        <h2>🏢 Company Register</h2>

        <div id="message"></div>

        <div class="form-group">
            <label>Company Name</label>
            <input type="text" id="name" placeholder="Enter company name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter company email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password">
        </div>

        <div class="form-group">
            <label>Industry</label>
            <input type="text" id="industry" placeholder="e.g. IT, Finance, Healthcare">
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" id="location" placeholder="e.g. Mumbai, Delhi, Pune">
        </div>

        <button onclick="companyRegister()">Register</button>

        <p style="text-align:center; margin-top:15px;">
            Already have an account?
            <a href="company-login.html">Login here</a>
        </p>

        <p style="text-align:center; margin-top:10px;">
            <a href="index.html">← Back to Home</a>
        </p>
    </div>
</main>

<!-- Footer -->
<footer>
    <p>© 2026 SmartPlacementSystem | All Rights Reserved</p>
</footer>

<script src="../js/company.js"></script>
</body>
</html>
