<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Register</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Header -->
<header>
    <h1>🎓 SmartPlacementSystem</h1>
    <p>Student Registration</p>
</header>

<!-- Register Form -->
<main>
    <div class="form-container">
        <h2>👨‍🎓 Student Register</h2>

        <div id="message"></div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password">
        </div>

        <div class="form-group">
            <label>Skills</label>
            <input type="text" id="skills" placeholder="e.g. Java, Python, MySQL">
        </div>

        <div class="form-group">
            <label>Resume Link</label>
            <input type="text" id="resume" placeholder="Paste your resume link">
        </div>

        <button onclick="register()">Register</button>

        <p style="text-align:center; margin-top:15px;">
            Already have an account?
            <a href="student-login.html">Login here</a>
        </p>

        <p style="text-align:center; margin-top:10px;">
            <a href="index.html">← Back to Home</a>
        </p>
    </div>
</main>

<!-- Footer -->
<footer>
    <p>© 2026 SmartPlacementSystem | All Rights Reserved</p>
</footer>

<script src="../js/student.js"></script>
</body>
</html>
